services:
  app:
    build: .
    container_name: iranaip_app
    restart: unless-stopped
    ports:
      - 3000:3000
    env_file:
      - .env
    depends_on:
      - postgres
    networks:
      - iranaip

  postgres:
    image: postgres:alpine
    container_name: iranaip_db
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./postgresql:/var/lib/postgresql
    networks:
      - iranaip

networks:
  iranaip:
    external: true
